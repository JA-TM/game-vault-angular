<main class="contenedor">
  <h1>GAME VAULT</h1>
  <p class="subtitulo">
    Catálogo de videojuegos · v0.7
  </p>

  <div class="acciones-top">
    <button class="btn-nuevo" (click)="toggleFormulario()">
      {{ mostrarFormulario() ? '✕ Cancelar' : '+ Añadir juego' }}
    </button>
  </div>

  @if (mostrarFormulario()) {
    <app-formulario-juego (juegoCreadо)="onJuegoCreado()" />
  }

  <div class="buscador">
    <input
      type="text"
      placeholder="Buscar por nombre, consola o género..."
      [value]="filtro()"
      (input)="onFiltro($any($event.target).value)"
    />
  </div>

  @if (juegos().length === 0) {
    <p class="mensaje-vacio">No hay juegos registrados.</p>
  } @else {
    <section class="listado-juegos">
      @for (juego of juegos(); track juego.id) {
        <app-tarjeta-juego [juego]="juego" />
      }
    </section>
  }
</main>
