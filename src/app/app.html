<main class="contenedor">
  <h1>GAME VAULT</h1>
  <p class="subtitulo">
    Catálogo de videojuegos · v0.6
  </p>

  <div class="buscador">
    <input
      type="text"
      placeholder="Buscar por nombre, consola o género..."
      [value]="filtro()"
      (input)="onFiltro($any($event.target).value)"
    />
  </div>

  @if (juegos().length === 0) {
    <p class="mensaje-vacio">No hay juegos registrados.</p>
  } @else {
    <section class="listado-juegos">
      @for (juego of juegos(); track juego.id) {
        <app-tarjeta-juego [juego]="juego" />
      }
    </section>
  }
</main>
