<main class="contenedor">
    <div class="acciones-top">
      <button class="btn-nuevo" (click)="irANuevo()">
        [ + nuevo registro ]
      </button>
    </div>
  
    <div class="buscador">
      <input
        type="text"
        placeholder="> buscar por nombre, consola o género..."
        [value]="filtro()"
        (input)="onFiltro($any($event.target).value)"
      />
    </div>
  
    @if (juegos().length === 0) {
      <p class="mensaje-vacio">No hay registros en la base de datos.</p>
    } @else {
      <section class="listado-juegos">
        @for (juego of juegos(); track juego.id) {
          <app-tarjeta-juego
            [juego]="juego"
            (editar)="onEditar($event)"
          />
        }
      </section>
    }
  </main>
