<section class="formulario">
    <h2>Añadir juego</h2>
  
    <div class="campo">
      <label>Nombre *</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Nombre del juego">
    </div>
  
    <div class="campo">
      <label>Consola *</label>
      <input type="text" [(ngModel)]="consola" placeholder="PC, PS5, Xbox...">
    </div>
  
    <div class="campo">
      <label>Género *</label>
      <input type="text" [(ngModel)]="genero" placeholder="RPG, Acción...">
    </div>
  
    <div class="campo">
      <label>Modalidad *</label>
      <input type="text" [(ngModel)]="modalidad" placeholder="Single Player, Multiplayer...">
    </div>
  
    <div class="campo">
      <label>Desarrollador *</label>
      <input type="text" [(ngModel)]="desarrollador" placeholder="Nombre del estudio">
    </div>
  
    <div class="campo">
      <label>Año de lanzamiento</label>
      <input type="number" [(ngModel)]="anio_lanzamiento">
    </div>
  
    <div class="campo">
      <label>Puntuación (1-10)</label>
      <input type="number" [(ngModel)]="puntuacion" min="1" max="10">
    </div>
  
    <div class="campo campo-check">
      <label>Verificado</label>
      <input type="checkbox" [(ngModel)]="verificado">
    </div>
  
    <div class="acciones">
      <button (click)="guardar()">Guardar juego</button>
      <button class="btn-cancelar" (click)="limpiar()">Limpiar</button>
    </div>
  </section>
